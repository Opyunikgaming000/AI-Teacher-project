name: Move Release Files to Repo
on:
  workflow_dispatch:

jobs:
  move_files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # यह सबसे लेटेस्ट रिलीज से सारी फाइलें खुद उठा लेगा
          gh release download --dir . --pattern "*" || echo "No release found"

      - name: Commit and Push to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-moved files from release" || exit 0
          git push
