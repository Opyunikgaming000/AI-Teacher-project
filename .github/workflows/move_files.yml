name: Move Release Files to Repo
on:
  workflow_dispatch:

jobs:
  move_files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # यह आपकी रिलीज से फाइलें निकालेगा
          gh release download guru-transfer-20260313 --dir . --pattern "*"

      - name: Commit and Push to Main
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Files moved from release to main" || echo "No changes to commit"
          git push
